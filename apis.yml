  - type: Features
    data:
      - name: Fresnel QPU
        description: Pasqal's commercial neutral-atom quantum processor based on arrays of laser-trapped Rydberg atoms, scaling toward 1000+ atoms.
      - name: Dual analog and digital quantum computing
        description: Single neutral-atom architecture supports both analog Hamiltonian simulation and digital gate-based programs.
      - name: Pulser open-source SDK
        description: Apache-2.0 Python library for composing, simulating, and executing pulse sequences on neutral-atom hardware.
      - name: Pasqal Cloud Services REST API
        description: REST API for batches, jobs, workloads, devices, projects, members, and billing with Auth0 authentication.
      - name: pasqal-cloud Python SDK
        description: Python SDK wrapping the Cloud Services REST API for submitting Pulser sequences to QPUs and emulators.
      - name: Qadence digital-analog interface
        description: Higher-level digital-analog programming interface with PyTorch (pyqtorch) and JAX (horqrux) backends.
      - name: Pulser Studio no-code platform
        description: Visual programming environment for designing neutral-atom quantum programs without writing code.
      - name: EMU-MPS and EMU-SV emulators
        description: GPU-accelerated emulators for 60-100 qubit neutral-atom dynamics simulation, available locally and on Pasqal Cloud.
      - name: Quantum Evolution Kernel (QEK)
        description: Open-source graph machine learning library using quantum-driven graph similarity metrics.
      - name: QUBO and MIS application libraries
        description: Open-source optimization libraries mapping QUBO and Maximum Independent Set problems onto Rydberg-blockade dynamics.
      - name: Auth0 authentication
        description: Cloud Services authentication via username/password, token-provider, or Auth0TokenProvider with refreshing token support.
      - name: Credits-based billing
        description: Credit Pools and Monthly Credit Consumption endpoints support a pay-as-you-go credits billing model on Pasqal Cloud Services.
      - name: NVIDIA CUDA-Q integration
        description: Hybrid quantum-HPC integration with NVIDIA CUDA-Q for accelerated quantum-classical workflows.
      - name: Multi-cloud distribution
        description: Pasqal QPUs and emulators distributed through Google Cloud, Microsoft Azure Quantum, OVHcloud, and AWS partners.
      - name: On-premise deployment option
        description: Commercial-grade neutral-atom quantum computers available for on-site deployment at customer facilities.
      - name: Logical qubits demonstration
        description: May 2026 industry-first demonstration of neutral-atom logical qubits outperforming physical qubits on differential equations.
  - type: UseCases
    data:
      - name: Combinatorial optimization
        description: QUBO and MIS-based optimization for logistics, smart charging, routing, and scheduling on neutral-atom hardware.
      - name: Quantum machine learning
        description: Graph kernels and variational quantum models for classification, regression, and generative tasks via QEK and Qadence.
      - name: Quantum chemistry and materials
        description: Analog Hamiltonian simulation of strongly correlated systems and materials discovery workloads.
      - name: Drug discovery and molecular docking
        description: Neutral-atom QPUs applied to molecular docking and protein design (e.g., partnership with True Nexus).
      - name: Finance and risk modeling
        description: Portfolio optimization and risk analytics on neutral-atom hardware via partner deployments.
      - name: Smart charging and energy optimization
        description: QAOA-tailored approaches for electric-vehicle smart-charging and grid optimization.
      - name: Quantum-enhanced HPC
        description: Hybrid quantum-classical workloads bridging Pasqal QPUs and supercomputing centers (CINECA, GENCI).
      - name: Space mission optimization
        description: QUBO-formulated space mission optimization (smo-qubo) on neutral-atom backends.
  - type: Integrations
    data:
      - name: NVIDIA CUDA-Q
        description: Pasqal-NVIDIA integration enabling hybrid quantum-HPC environments via CUDA-Q.
      - name: Microsoft Azure Quantum
        description: pulser-azure provider exposes Pasqal QPUs via Azure Quantum.
      - name: Google Cloud Marketplace
        description: Pasqal Cloud Services available through Google Cloud partnerships.
      - name: AWS / IBM partnerships
        description: Pasqal partners with IBM and is reachable via AWS distribution channels for enterprise quantum workloads.
      - name: OVHcloud
        description: Pulser-OVH tutorials and integration for European sovereign quantum cloud access.
      - name: Atos / Eviden myQLM
        description: Pulser-myQLM integration for the Atos/Eviden myQLM quantum programming framework.
      - name: CINECA / GENCI / EuroHPC
        description: Pasqal QPUs integrated into European supercomputing centers for hybrid HPC-quantum workloads.
      - name: Aramco
        description: Saudi Aramco partnership delivering the Middle East's first commercial quantum computing service platform.
  - type: Solutions
    data:
      - name: Pasqal Cloud Services
        description: Pay-as-you-go cloud access to Pasqal Fresnel QPUs and emulator backends via REST API and Python SDK.
      - name: On-premise quantum computers
        description: Commercial-grade neutral-atom quantum computers delivered for on-site customer deployment.
      - name: Pulser Studio
        description: No-code visual environment for authoring neutral-atom quantum programs.
      - name: Quantum application libraries
        description: Vertical solution libraries — QEK, QUBO-Solver, MIS, smo-qubo, Molecular-Docking — built on Pulser and Qadence.
