description: >-
  Pasqal is a French neutral-atom quantum computing company headquartered in
  Palaiseau, France and co-founded in 2019 by 2022 Physics Nobel Laureate
  Alain Aspect. Pasqal builds commercial-grade neutral-atom quantum
  processors (the Fresnel QPU family) that use arrays of laser-trapped Rydberg
  atoms to run both analog and digital quantum programs, and packages them as
  on-premise systems and as Pasqal Cloud Services — a pay-as-you-go quantum
  computing platform also distributed through Google Cloud, Microsoft Azure
  Quantum, OVHcloud, and AWS partners. The developer surface is anchored by
  Pulser, the open-source (Apache-2.0) Python library for pulse-level/analog
  programming of neutral-atom devices, the pasqal-cloud Python SDK for
  submitting Pulser sequences and workloads to QPUs and emulators, and the
  Pasqal Cloud Services REST API (with Auth0-based authentication and v1/v2
  endpoints for batches, jobs, devices, workloads, projects, members, billing,
  and OVH integrations). The broader ecosystem includes Qadence
  (digital-analog programming), Pulser Studio (no-code visual programming),
  the EMU-MPS and EMU-SV GPU-accelerated emulators, and quantum application
  libraries — QEK (Quantum Evolution Kernel for graph ML), QUBO-Solver,
  Maximum-Independent-Set, and QoolQit (Rydberg analog algorithm
  development). Pasqal serves 35+ commercial engagements across energy,
  finance, logistics, automotive, and pharma — including BMW, Thales,
  Capgemini, Sumitomo, Aramco, CMA CGM, and KAIST — and partners with NVIDIA
  (CUDA-Q), IBM, Google, and Microsoft. In May 2026 Pasqal demonstrated logical
  qubits outperforming physical qubits on differential equations, and in
  March 2026 announced 340M+ euros of new financing ahead of going public via
  business combination with Bleichroeder Acquisition Corp II.
apis:
  - aid: pasqal:pasqal-cloud-services-api
    name: Pasqal Cloud Services API
    tags:
      - Batches
      - Jobs
      - Workloads
      - Devices
      - Quantum Computing
    humanURL: https://docs.pasqal.com/cloud/
    properties:
      - url: https://docs.pasqal.com/cloud/
        type: Documentation
      - url: https://docs.pasqal.com/cloud/api/
        type: APIReference
      - url: https://portal.pasqal.cloud/
        type: Portal
      - url: https://github.com/pasqal-io/pasqal-cloud
        type: SDK
        name: pasqal-cloud Python SDK
      - url: https://docs.pasqal.com/cloud/usage/authentication/
        type: Authentication
    description: >-
      REST API for Pasqal Cloud Services — submit and manage quantum
      Batches and Jobs on Pasqal Fresnel QPUs and on emulator backends
      (EMU-FREE, EMU-TN, EMU-MPS, EMU-SV), query Devices and Device
      Specifications, run custom Workloads, and manage Projects, Members,
      Contracts, Credit Pools, and Monthly Credit Consumption. Endpoints are
      organized under /api/v1 and /api/v2 (batches, jobs, devices,
      workloads, projects, billing). Authentication is Auth0-based with
      username/password, token-provider, and Auth0TokenProvider flows.
  - aid: pasqal:pulser-sdk
    name: Pulser SDK
    tags:
      - Pulse-Level Control
      - Analog Quantum
      - Neutral Atom
      - SDK
      - Open Source
    humanURL: https://pulser.readthedocs.io
    properties:
      - url: https://pulser.readthedocs.io
        type: Documentation
      - url: https://github.com/pasqal-io/Pulser
        type: GitHubRepository
      - url: https://pypi.org/project/pulser/
        type: PackageRegistry
      - url: https://github.com/pasqal-io/Pulser/blob/develop/LICENSE
        type: License
    description: >-
      Pulser is Pasqal's open-source (Apache-2.0) Python framework for
      composing, simulating, and executing pulse sequences on neutral-atom
      quantum devices. It supports both digital quantum computing and
      analog quantum simulation with pulse-level control, ships with
      pulser_simulation (QuTiP-based emulation), and integrates with the
      pasqal-cloud SDK via pulser-pasqal for submission to Pasqal Cloud
      Services. Current release v1.8.0 (May 2026).
  - aid: pasqal:qadence-sdk
    name: Qadence SDK
    tags:
      - Digital Analog
      - Variational Algorithms
      - Quantum Machine Learning
      - SDK
      - Open Source
    humanURL: https://pasqal-io.github.io/qadence/
    properties:
      - url: https://pasqal-io.github.io/qadence/
        type: Documentation
      - url: https://github.com/pasqal-io/qadence
        type: GitHubRepository
      - url: https://pypi.org/project/qadence/
        type: PackageRegistry
    description: >-
      Qadence is Pasqal's higher-level digital-analog quantum programming
      interface for writing variational quantum programs with tunable qubit
      interactions, designed for neutral-atom hardware. The Qadence ecosystem
      includes qadence-libs (QUBO/graph embedding/QML extensions),
      qadence-protocols (error mitigation), qadence2-core / -ir / -expressions
      / -platforms (next-generation IR and backends), pyqtorch (PyTorch state
      vector simulator), and horqrux (JAX simulator).
  - aid: pasqal:quantum-evolution-kernel
    name: Quantum Evolution Kernel (QEK)
    tags:
      - Graph Machine Learning
      - Quantum Machine Learning
      - Library
      - Open Source
    humanURL: https://github.com/pasqal-io/quantum-evolution-kernel
    properties:
      - url: https://github.com/pasqal-io/quantum-evolution-kernel
        type: GitHubRepository
    description: >-
      QEK is Pasqal's open-source graph machine learning library that uses
      quantum-driven similarity metrics derived from neutral-atom dynamics
      to build graph kernels for classification and regression on graph data.
  - aid: pasqal:qubo-solver
    name: QUBO Solver
    tags:
      - Optimization
      - QUBO
      - Library
      - Open Source
    humanURL: https://github.com/pasqal-io/qubo-solver
    properties:
      - url: https://github.com/pasqal-io/qubo-solver
        type: GitHubRepository
    description: >-
      Quadratic Unconstrained Binary Optimization solver library that
      combines classical heuristics with quantum and quantum-inspired
      approaches running on Pasqal neutral-atom hardware and emulators.
  - aid: pasqal:maximum-independent-set
    name: Maximum Independent Set Solver
    tags:
      - Optimization
      - Graph Theory
      - Library
      - Open Source
    humanURL: https://github.com/pasqal-io/maximum-independent-set
    properties:
      - url: https://github.com/pasqal-io/maximum-independent-set
        type: GitHubRepository
    description: >-
      Maximum Independent Set (MIS) solver library that exploits the natural
      mapping of MIS onto Rydberg-blockade dynamics of neutral-atom QPUs,
      with quantum and classical baselines for benchmarking.
  - aid: pasqal:qoolqit-sdk
    name: QoolQit SDK
    tags:
      - Rydberg
      - Analog Quantum
      - Algorithm Development
      - SDK
      - Open Source
    humanURL: https://github.com/pasqal-io/qoolqit
    properties:
      - url: https://github.com/pasqal-io/qoolqit
        type: GitHubRepository
    description: >-
      QoolQit is Pasqal's Python package for simplified algorithm development
      in the Rydberg Analog Model on neutral-atom hardware, providing a more
      approachable layer above Pulser for analog quantum algorithm authors.
  - aid: pasqal:emulators
    name: Pasqal Emulators (EMU-MPS, EMU-SV)
    tags:
      - Emulator
      - Simulation
      - GPU
      - PyTorch
    humanURL: https://github.com/pasqal-io/emulators
    properties:
      - url: https://github.com/pasqal-io/emulators
        type: GitHubRepository
    description: >-
      Pasqal's PyTorch-based GPU-accelerated emulator monorepo housing EMU-MPS
      (matrix-product-state emulator for 60-100 qubits) and EMU-SV
      (high-precision state-vector emulator) for simulating neutral-atom
      device dynamics on classical hardware, accessible locally and as
      Pasqal Cloud Services backends.
